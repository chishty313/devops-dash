services:
  backend_blue:
    image: ghcr.io/${GITHUB_OWNER:-your-org}/qtec-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEPLOY_COLOR: blue
      MONGODB_URI: ${MONGODB_URI}
    restart: unless-stopped

  backend_green:
    image: ghcr.io/${GITHUB_OWNER:-your-org}/qtec-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEPLOY_COLOR: green
      MONGODB_URI: ${MONGODB_URI}
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-your-org}/qtec-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend_blue
      - backend_green
      - grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Must match the public URL (HTTPS + subpath) or Grafana redirects in a loop behind nginx
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_DOMAIN: ${DOMAIN}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana_data:
