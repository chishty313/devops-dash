# Kubernetes Secret — qtec-secrets
# ──────────────────────────────────────────────────────────────────────────────
# DO NOT commit a file with real values. This example shows the required keys.
#
# Option A — kubectl imperative (recommended for one-off setup):
#
#   kubectl create secret generic qtec-secrets \
#     --namespace qtec \
#     --from-literal=mongodb_uri="mongodb+srv://USER:PASS@cluster.mongodb.net/qtec?retryWrites=true&w=majority" \
#     --from-literal=mongo_root_user="admin" \
#     --from-literal=mongo_root_password="changeme"
#
# Option B — declarative YAML (fill in your own base64-encoded values):
#   echo -n 'your-value' | base64
#
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: qtec-secrets
  namespace: qtec
  labels:
    app.kubernetes.io/name: qtec
type: Opaque
# stringData lets you supply plain-text; Kubernetes base64-encodes before storing.
# Replace every <placeholder> with your real value before applying.
stringData:
  mongodb_uri: "<mongodb+srv://USER:PASS@cluster.mongodb.net/qtec?retryWrites=true&w=majority>"
  mongo_root_user: "<admin>"
  mongo_root_password: "<changeme>"
