apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qtec-ingress
  namespace: qtec
  annotations:
    # SSL is terminated by the Docker nginx proxy BEFORE traffic reaches here.
    # k3s nginx-ingress therefore receives plain HTTP — no cert-manager needed.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

    # Tell the ingress controller to trust X-Forwarded-* headers from nginx
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/forwarded-for-header: "X-Forwarded-For"

    # Rate-limit: 100 requests/sec per IP (mirrors Docker nginx config)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "2"

    # Proxy timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Security headers (inner hop — outer nginx already sets them,
    # but set here too so direct NodePort access is also secured)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
spec:
  ingressClassName: nginx
  # No TLS block — SSL terminates at Docker nginx, not here
  rules:
    - host: qtec-k8s.chishty.me
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
