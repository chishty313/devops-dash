apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qtec-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - qtec.chishty.me
      secretName: qtec-tls
  rules:
    - host: qtec.chishty.me
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
